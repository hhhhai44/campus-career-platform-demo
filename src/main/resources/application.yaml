server:
  port: 8081

spring:
  profiles:
    active: dev
  application:
    name: campus-career-platform-demo
  datasource:
    driver-class-name: ${ccpd.datasource.driver-class-name}
    url: jdbc:mysql://${ccpd.datasource.host}:${ccpd.datasource.port}/${ccpd.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${ccpd.datasource.username}
    password: ${ccpd.datasource.password}
  data:
    redis:
      host: ${ccpd.redis.host}
      port: ${ccpd.redis.port}
      password: ${ccpd.redis.password}
      database: ${ccpd.redis.database}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
    date-format: "yyyy-MM-dd HH:mm:ss"
  jwt:
    secret-key: ${ccpd.jwt.secret-key}
    ttl: ${ccpd.jwt.ttl}
    # 设置前端传递过来的令牌名称
    token-name: ${ccpd.jwt.token-name}

ccpd:
  qwen:
    # TODO(Qwen): 填充你的 DashScope API Key（建议通过环境变量注入，不要写入仓库）
    # 例如：在系统环境变量中配置 CCPD_QWEN_API_KEY=xxxx
    api-key: ${ccpd.qwen.api-key}
    # TODO(Qwen): 如需切换地域/私有化网关，可配置 Base URL（当前版本 SDK 可能无需手动设置）
    base-url: ${ccpd.qwen.base-url}
#    # TODO(Qwen): 模型可按需切换，如 qwen-plus / qwen-turbo 等
#    model: ${ccpd.qwen.model}
#    # TODO(Qwen): 后续可将 system prompt 做成可配置项，结合论坛场景进行角色定制
#    system-prompt: ${CCPD_QWEN_SYSTEM_PROMPT:你是一个专业且友好的校园职涯问答助手。}
#  cloud:
#    sentinel:
#      transport:
#        port: 8179
#        dashboard: localhost:8080 #配置Sentinel dashboard地址

mybatis-plus:
  type-aliases-package: com.hhhhai.ccpd.entity
  type-enums-package: com.hhhhai.ccpd.common.enums
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl # 别名扫描包

logging:
  level:
    root: info
    com.hhhhai.ccpd: debug
    com.hhhhai.ccpd.mapper: debug

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.career.infra.persistence.mysql.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true